<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="/src/assets/css/loading.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0 maximum-scale=1.0, user-scalable=no">
    <title>FAIVS-A</title>
    <style>
        html,
        body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            font-family: 'boschsans regular', sans-serif;
        }

        #app {
            position: relative;
            top: 8px;
            height: calc(100% - 8px);
            width: 100%;
        }
    </style>
</head>

<body>
    <img src="src/assets/img/top.jpg" alt="" style="width: 100%; height: 8px;position:absolute;top:0;z-index: 2;">
    <div id="app">
        <div class="loader-main bs-shade">
            <div class="a-activity-indicator" aria-live="off">
                <div class="a-activity-indicator__top-box"></div>
                <div class="a-activity-indicator__bottom-box"></div>
            </div>
        </div>
    </div>
    <script type="module" src="/src/main.js"></script>

</body>

</html>
